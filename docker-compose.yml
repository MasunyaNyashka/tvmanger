version: '3.9'
services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: tv-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - tv-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: tv-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: tv-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - tv-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tv-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tv-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: tv-kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: tv-zookeeper:2181
    networks:
      - tv-network

  postgres:
    image: postgres:16
    container_name: tv-postgres
    restart: always
    environment:
      POSTGRES_USER: tv_user
      POSTGRES_PASSWORD: tv_password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - tv-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tv-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tv-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tv.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - tv-network

volumes:
  tv-postgres-data:

networks:
  tv-network:
    driver: bridge