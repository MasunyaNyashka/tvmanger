version: '3.9'
services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: tv-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - tv-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: tv-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: tv-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - tv-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tv-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tv-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: tv-zookeeper:2181
    networks:
      - tv-network

  postgres:
    image: postgres:16
    container_name: tv-postgres
    restart: always
    environment:
      POSTGRES_USER: tv_user
      POSTGRES_PASSWORD: tv_password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - tv-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tv-network

  discovery-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: discovery-service
    container_name: tv-discovery
    ports:
      - "8761:8761"
    networks:
      - tv-network

  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: api-gateway
    container_name: tv-api-gateway
    depends_on:
      - discovery-service
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: super-secret-key-super-secret-key-super-secret-key
    networks:
      - tv-network

  auth-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: auth-service
    container_name: tv-auth-service
    depends_on:
      - postgres
      - discovery-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: tv_user
      SPRING_DATASOURCE_PASSWORD: tv_password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: super-secret-key-super-secret-key-super-secret-key
    networks:
      - tv-network

  tariff-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: tariff-service
    container_name: tv-tariff-service
    depends_on:
      - postgres
      - discovery-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tariff_db
      SPRING_DATASOURCE_USERNAME: tv_user
      SPRING_DATASOURCE_PASSWORD: tv_password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: super-secret-key-super-secret-key-super-secret-key
    networks:
      - tv-network

  order-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: order-service
    container_name: tv-order-service
    depends_on:
      - postgres
      - discovery-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: tv_user
      SPRING_DATASOURCE_PASSWORD: tv_password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: super-secret-key-super-secret-key-super-secret-key
    networks:
      - tv-network

  service-request-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: service-request-service
    container_name: tv-service-request-service
    depends_on:
      - postgres
      - discovery-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/service_request_db
      SPRING_DATASOURCE_USERNAME: tv_user
      SPRING_DATASOURCE_PASSWORD: tv_password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: super-secret-key-super-secret-key-super-secret-key
    networks:
      - tv-network

  ui-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: ui-service
    container_name: tv-ui-service
    depends_on:
      - auth-service
      - tariff-service
      - order-service
      - service-request-service
    ports:
      - "8090:8090"
    environment:
      SERVICES_AUTH: http://auth-service:8081
      SERVICES_TARIFF: http://tariff-service:8082
      SERVICES_ORDER: http://order-service:8083
      SERVICES_SERVICEREQUEST: http://service-request-service:8084
      VAADIN_PRODUCTION_MODE: "true"
    networks:
      - tv-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tv-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - tv-network

volumes:
  tv-postgres-data:

networks:
  tv-network:
    driver: bridge
