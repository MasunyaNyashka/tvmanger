server:
  port: 8082

spring:
  application:
    name: tariff-service

  datasource:
    url: jdbc:postgresql://localhost:5432/tariff_db
    username: tv_user
    password: tv_password

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET:super-secret-key-super-secret-key-super-secret-key}
