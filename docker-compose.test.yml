version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: tv-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tv_user
      POSTGRES_PASSWORD: tv_password
      POSTGRES_DB: postgres
    ports:
      - "15432:5432"
    volumes:
      - tv-test-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tv-test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tv_user -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: discovery-service
    container_name: tv-test-discovery
    ports:
      - "18761:8761"
    networks:
      - tv-test-network
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: api-gateway
    container_name: tv-test-api-gateway
    depends_on:
      - discovery-service
    ports:
      - "18080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: super-secret-key-super-secret-key-super-secret-key
    networks:
      - tv-test-network

  auth-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: auth-service
    container_name: tv-test-auth-service
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started
    ports:
      - "18081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: tv_user
      SPRING_DATASOURCE_PASSWORD: tv_password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: super-secret-key-super-secret-key-super-secret-key
    networks:
      - tv-test-network

  tariff-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: tariff-service
    container_name: tv-test-tariff-service
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started
    ports:
      - "18082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tariff_db
      SPRING_DATASOURCE_USERNAME: tv_user
      SPRING_DATASOURCE_PASSWORD: tv_password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: super-secret-key-super-secret-key-super-secret-key
    networks:
      - tv-test-network

  order-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: order-service
    container_name: tv-test-order-service
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started
    ports:
      - "18083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: tv_user
      SPRING_DATASOURCE_PASSWORD: tv_password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: super-secret-key-super-secret-key-super-secret-key
    networks:
      - tv-test-network

  service-request-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: service-request-service
    container_name: tv-test-service-request-service
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started
    ports:
      - "18084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/service_request_db
      SPRING_DATASOURCE_USERNAME: tv_user
      SPRING_DATASOURCE_PASSWORD: tv_password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: super-secret-key-super-secret-key-super-secret-key
    networks:
      - tv-test-network

volumes:
  tv-test-postgres-data:

networks:
  tv-test-network:
    driver: bridge
